services:
  cantonese-voice-api:
    build: .
    container_name: cantonese-voice-api
    ports:
      - "3057:8000"
    volumes:
      # Volume for temporary audio files (persists across container restarts)
      - ./data:/app/data
      # Optional: Mount cache for Whisper model to avoid re-downloading
      - whisper-cache:/root/.cache/huggingface
    environment:
      - DATA_DIR=/app/data
      # Optional: Override other settings via environment variables
      # - WHISPER_MODEL=base
      # - WHISPER_LANGUAGE=yue
      # - MAX_AUDIO_SECONDS=15
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

volumes:
  whisper-cache:
    name: cantonese-voice-api-whisper-cache
